# -*- coding: utf-8 -*-
"""
Section 3.3 - Dual Economic & Physical Feasibility Heatmaps
Visualizes the cannibalization between Tiers (Left) and the 
resulting Total Gross Revenue (Right).
"""

import pandas as pd
import matplotlib.pyplot as plt
import seaborn as sns
import numpy as np
import os
import warnings

warnings.filterwarnings("ignore")

# =============================================================================
# 1. SETUP & PARAMETERS
# =============================================================================
BASE_FOLDER = r"C:\Users\thijs\Downloads\hydesign\hydesign\examples\Thesis_ThijsvanWaveren\scripts"
os.chdir(BASE_FOLDER)

CAPACITY = 16.0 

PRICE_A  = 4.0  
PRICE_B1 = 2.8  
PRICE_B2 = 1.6  
PRICE_C = 0.4

# =============================================================================
# 2. DATA EXTRACTION & AGGREGATION
# =============================================================================
file_path_1 = os.path.join(BASE_FOLDER, f"Feasible_3D_Sweep_Results_99.9pct_IT{CAPACITY}.csv")
file_path_2 = os.path.join(BASE_FOLDER, f"Feasible_3D_Sweep_Results_99.9pct_IT{CAPACITY:.1f}.csv")
file_path = file_path_1 if os.path.exists(file_path_1) else file_path_2

if not os.path.exists(file_path):
    raise FileNotFoundError(f"Could not find the 16 MW CSV file at {file_path}")

df = pd.read_csv(file_path)

# Calculate Revenues
df['Revenue_A_MEUR'] = df['Energy_A_Annual_GWh'] * PRICE_A
df['Revenue_B1_MEUR'] = df['Energy_B1_Annual_GWh'] * PRICE_B1
df['Revenue_B2_MEUR'] = df['Energy_B2_Annual_GWh'] * PRICE_B2
df['Revenue_C_MEUR'] = df['Energy_B2_Annual_GWh'] * PRICE_C
df['Total_Revenue_MEUR'] = df['Revenue_A_MEUR'] + df['Revenue_B1_MEUR'] + df['Revenue_B2_MEUR'] + df['Revenue_C_MEUR']

# Find the maximum revenue achievable for each A/B1 combination
idx_max = df.groupby(['Tier_A_MW', 'Tier_B1_MW'])['Total_Revenue_MEUR'].idxmax()
best_combinations = df.loc[idx_max]

# Pivot data for the TWO heatmaps
heatmap_revenue = best_combinations.pivot(index='Tier_B1_MW', columns='Tier_A_MW', values='Total_Revenue_MEUR')
heatmap_b2 = best_combinations.pivot(index='Tier_B1_MW', columns='Tier_A_MW', values='Tier_B2_MW')

# Sort Y-axis (0 at bottom)
heatmap_revenue = heatmap_revenue.sort_index(ascending=False)
heatmap_b2 = heatmap_b2.sort_index(ascending=False)

# =============================================================================
# 3. VISUALIZATION (SIDE-BY-SIDE)
# =============================================================================
fig, axes = plt.subplots(1, 2, figsize=(16, 7), facecolor='white')

cmap_rev = sns.color_palette("YlGnBu", as_cmap=True)
cmap_rev.set_bad(color='#f8f9f9') 

cmap_b2 = sns.color_palette("Purples", as_cmap=True)
cmap_b2.set_bad(color='#f8f9f9') 

# --- PANEL 1: TIER B2 CAPACITY (THE PHYSICS) ---
sns.heatmap(heatmap_b2, cmap=cmap_b2, annot=True, fmt=".0f", linewidths=0.5, linecolor='white',
            cbar_kws={'label': 'Optimized Tier B2 Capacity [MW]'}, ax=axes[0])
#axes[0].set_title("A. Physical Cannibalization (Optimized Tier B2)", fontsize=13, fontweight='bold', pad=15)
axes[0].set_xlabel("Allocated Tier A Capacity (Firm) [MW]", fontweight='bold')
axes[0].set_ylabel("Allocated Tier B1 Capacity (Daily) [MW]", fontweight='bold')

# --- PANEL 2: TOTAL REVENUE (THE ECONOMICS) ---
sns.heatmap(heatmap_revenue, cmap=cmap_rev, annot=False, fmt=".0f", linewidths=0.5, linecolor='white',
            cbar_kws={'label': 'Max Total Gross Revenue (Millions €)'}, ax=axes[1])
#axes[1].set_title("B. Economic Outcome (Total Gross Revenue)", fontsize=13, fontweight='bold', pad=15)
axes[1].set_xlabel("Allocated Tier A Capacity (Firm) [MW]", fontweight='bold')
axes[1].set_ylabel("", fontweight='bold') # Hide Y-label on second plot for cleanliness

# Format axes and plot the stars
max_rev = df['Total_Revenue_MEUR'].max()
optimal_row = df[df['Total_Revenue_MEUR'] == max_rev].iloc[0]
opt_a, opt_b1 = optimal_row['Tier_A_MW'], optimal_row['Tier_B1_MW']

x_coords = list(heatmap_revenue.columns)
y_coords = list(heatmap_revenue.index)
x_pos, y_pos = x_coords.index(opt_a) + 0.5, y_coords.index(opt_b1) + 0.5

for ax in axes:
    ax.set_xticklabels([f"{x:.0f}" for x in heatmap_revenue.columns], rotation=0)
    ax.set_yticklabels([f"{y:.0f}" for y in heatmap_revenue.index], rotation=0)
    # Add Star
    #ax.scatter(x_pos, y_pos, marker='*', s=300, color='#e74c3c', edgecolor='white', linewidth=1.2, zorder=10)
    # Label Infeasible Region
    #ax.text(0.95, 0.95, 'Infeasible Region', transform=ax.transAxes, ha='right', va='top', color='#a6acaf', fontsize=10, style='italic')

#axes[1].scatter([], [], marker='*', s=150, color='#e74c3c', label='Global Optimum (8A, 0B1, 7B2)')
#axes[1].legend(loc='lower left', frameon=True, facecolor='white')

plt.tight_layout()

save_path = os.path.join(BASE_FOLDER, 'dual_heatmap_16MW.svg')
plt.savefig(save_path, dpi=300, bbox_inches='tight')
print(f"✅ Plot saved to: {save_path}")
plt.show()